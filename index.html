<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Induk Siswa - MA Bidayatul Hidayah</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b2f1c 0%, #1e4a2f 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1f4d2c 0%, #0e3a1e 100%);
            padding: 28px 32px;
            text-align: center;
            border-bottom: 4px solid #d4af37;
        }
        .header h1 { font-size: 2.2em; color: #d4af37; }
        .header p { color: #e8e0b0; margin-top: 8px; }
        .sync-status {
            margin-top: 12px;
            padding: 6px 16px;
            border-radius: 30px;
            background: rgba(212, 175, 55, 0.2);
            display: inline-block;
            font-size: 0.8em;
            color: #d4af37;
        }
        .content { padding: 32px; }
        .form-section {
            background: #ffffff;
            padding: 28px;
            border-radius: 20px;
            margin-bottom: 32px;
            border: 1px solid #e8e0b0;
        }
        .form-section h2 {
            color: #1f4d2c;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #d4af37;
            display: inline-block;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1f4d2c;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e8e0b0;
            border-radius: 12px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #d4af37;
        }
        .photo-preview {
            width: 160px;
            height: 160px;
            border: 3px dashed #d4af37;
            border-radius: 16px;
            background: #faf9f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            margin-top: 10px;
        }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .photo-preview span { color: #9b9a7a; font-size: 12px; text-align: center; padding: 10px; }
        .photo-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-photo {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-photo.primary { background: #1f4d2c; color: #d4af37; }
        .btn-photo.danger { background: #dc3545; color: white; }
        .btn-group { display: flex; gap: 15px; margin-top: 28px; flex-wrap: wrap; }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: linear-gradient(135deg, #1f4d2c, #0e3a1e); color: #d4af37; }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-secondary { background: #f0ede0; color: #1f4d2c; border: 1px solid #d4af37; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .table-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #e8e0b0;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .total-badge {
            background: linear-gradient(135deg, #1f4d2c, #0e3a1e);
            padding: 6px 14px;
            border-radius: 30px;
            color: #d4af37;
        }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eee8d0; }
        th { background: linear-gradient(135deg, #1f4d2c, #0e3a1e); color: #d4af37; }
        tr:hover { background: #fefbe6; }
        .student-photo { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; cursor: pointer; border: 2px solid #d4af37; }
        .action-btns { display: flex; gap: 8px; }
        .btn-icon { padding: 6px 12px; font-size: 11px; border-radius: 20px; }
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            display: none;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #e8e0b0;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 30px; right: 30px;
            padding: 14px 24px;
            border-radius: 12px;
            color: white;
            z-index: 10000;
            animation: slideUp 0.3s ease;
            display: none;
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        .toast.info { background: #17a2b8; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @media print {
            .btn-group, .form-section, .action-btns, .no-print { display: none; }
        }
        @media (max-width: 768px) {
            .content { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
            .btn-group .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div></div>

    <div class="container">
        <div class="header">
            <h1>📖 BUKU INDUK SISWA</h1>
            <p>MA Bidayatul Hidayah | Tahun Ajaran 2024/2025</p>
            <div class="sync-status" id="syncStatus">
                ✅ Auto Sync ke Google Sheets
            </div>
        </div>

        <div class="content">
            <div class="form-section">
                <h2>📝 Formulir Pendaftaran / Edit Siswa</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>NOMOR INDUK SISWA (NIS) *</label>
                        <input type="text" id="nis" placeholder="Contoh: 2024001">
                    </div>
                    <div class="form-group">
                        <label>NAMA LENGKAP *</label>
                        <input type="text" id="nama" placeholder="Nama lengkap siswa">
                    </div>
                    <div class="form-group">
                        <label>TEMPAT LAHIR</label>
                        <input type="text" id="tempat_lahir" placeholder="Kota lahir">
                    </div>
                    <div class="form-group">
                        <label>TANGGAL LAHIR</label>
                        <input type="date" id="tanggal_lahir">
                    </div>
                    <div class="form-group">
                        <label>ALAMAT RUMAH</label>
                        <textarea id="alamat" rows="2" placeholder="Alamat lengkap"></textarea>
                    </div>
                    <div class="form-group">
                        <label>NO HP SISWA</label>
                        <input type="tel" id="no_hp" placeholder="081234567890">
                    </div>
                    <div class="form-group">
                        <label>Foto Siswa (OPSIONAL)</label>
                        <div class="photo-preview" id="photoPreview" onclick="document.getElementById('foto').click()">
                            <span>📸 Klik untuk upload foto</span>
                        </div>
                        <div class="photo-buttons">
                            <button type="button" class="btn-photo primary" onclick="document.getElementById('foto').click()">📷 Pilih Foto</button>
                            <button type="button" class="btn-photo danger" onclick="hapusFoto()">🗑️ Hapus</button>
                        </div>
                        <input type="file" id="foto" accept="image/*" style="display: none;" onchange="previewPhoto(this)">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="simpanData()">💾 Simpan Siswa</button>
                    <button class="btn btn-secondary" onclick="resetForm()">✖️ Batal Edit</button>
                    <button class="btn btn-info" onclick="loadData()">🔄 Refresh Data</button>
                </div>
            </div>

            <div class="table-section">
                <div class="table-header">
                    <h2>📋 Daftar Siswa</h2>
                    <div class="total-badge" id="totalSiswa">Total Siswa: 0</div>
                </div>
                <div class="btn-group" style="margin-bottom: 20px;">
                    <button class="btn btn-secondary btn-icon" onclick="printTable()">🖨️ Cetak Buku Induk</button>
                    <button class="btn btn-info btn-icon" onclick="exportToExcel()">📊 Download CSV</button>
                </div>
                <div class="table-wrapper">
                    <table id="studentTable">
                        <thead>
                            <tr><th>No</th><th>NIS</th><th>Nama Lengkap</th><th>Tempat Lahir</th><th>Tgl Lahir</th><th>Alamat</th><th>No HP</th><th>Foto</th><th>Aksi</th></tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="9" style="text-align:center;">📭 Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================================================
        // GANTI DENGAN URL DEPLOY APPS SCRIPT ANDA!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMZI4CGbqD_ATi5CZ9KFnnmSf8mhVmzzxrIef-w65P2RS3dH8eorBd9CIGq8LMomYr/exec';
        // ==================================================
        
        let students = [];

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        function previewPhoto(input) {
            const preview = document.getElementById('photoPreview');
            if (input.files && input.files[0]) {
                const file = input.files[0];
                if (file.size > 2 * 1024 * 1024) {
                    showToast('Ukuran foto maksimal 2MB!', 'error');
                    input.value = '';
                    preview.innerHTML = '<span>📸 Klik untuk upload foto</span>';
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => preview.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                reader.readAsDataURL(file);
            }
        }

        function hapusFoto() {
            document.getElementById('foto').value = '';
            document.getElementById('photoPreview').innerHTML = '<span>📸 Klik untuk upload foto</span>';
        }

        // JSONP Request untuk GET
        function jsonpRequest(url, callback) {
            const script = document.createElement('script');
            const callbackName = 'jsonp_callback_' + Date.now();
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                callback(data);
            };
            const separator = url.indexOf('?') === -1 ? '?' : '&';
            script.src = url + separator + 'callback=' + callbackName;
            document.body.appendChild(script);
        }

        // POST dengan JSONP (menggunakan iframe)
        function jsonpPost(url, data, callback) {
            const callbackName = 'jsonp_post_callback_' + Date.now();
            window[callbackName] = function(result) {
                delete window[callbackName];
                document.body.removeChild(iframe);
                callback(result);
            };
            
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = url + '?callback=' + callbackName;
            form.target = callbackName;
            form.style.display = 'none';
            
            const input = document.createElement('input');
            input.name = 'postData';
            input.value = JSON.stringify(data);
            form.appendChild(input);
            
            const iframe = document.createElement('iframe');
            iframe.name = callbackName;
            iframe.style.display = 'none';
            
            document.body.appendChild(iframe);
            document.body.appendChild(form);
            form.submit();
            
            setTimeout(() => {
                document.body.removeChild(form);
            }, 1000);
        }

        function loadData() {
            showLoading(true);
            jsonpRequest(SCRIPT_URL, (result) => {
                if (result.success && result.data) {
                    students = result.data;
                    renderTable();
                    updateTotal();
                    document.getElementById('syncStatus').innerHTML = `✅ Auto Sync | ${new Date().toLocaleTimeString()}`;
                    showToast(`Memuat ${students.length} data siswa`, 'success');
                } else {
                    showToast('Gagal memuat data: ' + (result.error || 'Unknown error'), 'error');
                }
                showLoading(false);
            });
        }

        function simpanData() {
            const nis = document.getElementById('nis').value.trim();
            const nama = document.getElementById('nama').value.trim();
            const tempat_lahir = document.getElementById('tempat_lahir').value;
            const tanggal_lahir = document.getElementById('tanggal_lahir').value;
            const alamat = document.getElementById('alamat').value;
            const no_hp = document.getElementById('no_hp').value;
            const fotoFile = document.getElementById('foto').files[0];

            if (!nis || !nama) return showToast('NIS dan Nama wajib diisi!', 'error');

            showLoading(true);
            
            const processSave = (fotoUrl) => {
                const newStudent = { 
                    nis, nama, 
                    tempat_lahir: tempat_lahir || '', 
                    tanggal_lahir: tanggal_lahir || '', 
                    alamat: alamat || '', 
                    no_hp: no_hp || '', 
                    foto: fotoUrl || '' 
                };
                
                jsonpPost(SCRIPT_URL + '?action=save', newStudent, (result) => {
                    if (result.success) {
                        showToast('Data berhasil disimpan ke Google Sheets!', 'success');
                        loadData();
                        resetForm();
                    } else {
                        showToast(result.error || 'Gagal menyimpan', 'error');
                    }
                    showLoading(false);
                });
            };
            
            if (fotoFile) {
                const reader = new FileReader();
                reader.onload = (e) => processSave(e.target.result);
                reader.readAsDataURL(fotoFile);
            } else {
                processSave('');
            }
        }

        function hapusData(nis) {
            if (!confirm(`Hapus data NIS ${nis}?`)) return;
            showLoading(true);
            jsonpRequest(`${SCRIPT_URL}?action=delete&nis=${nis}`, (result) => {
                if (result.success) {
                    showToast('Data berhasil dihapus!', 'success');
                    loadData();
                } else {
                    showToast('Gagal hapus data', 'error');
                }
                showLoading(false);
            });
        }

        function editData(nis) {
            const student = students.find(s => s.nis === nis);
            if (student) {
                document.getElementById('nis').value = student.nis;
                document.getElementById('nama').value = student.nama;
                document.getElementById('tempat_lahir').value = student.tempat_lahir || '';
                document.getElementById('tanggal_lahir').value = student.tanggal_lahir || '';
                document.getElementById('alamat').value = student.alamat || '';
                document.getElementById('no_hp').value = student.no_hp || '';
                if (student.foto) {
                    document.getElementById('photoPreview').innerHTML = `<img src="${student.foto}" style="width:100%;height:100%;object-fit:cover;">`;
                }
                document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
                showToast(`Edit data: ${student.nama}`, 'info');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            if (!students.length) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">📭 Belum ada data siswa. Silakan tambahkan melalui formulir.</td></tr>';
                return;
            }
            tbody.innerHTML = students.map((s, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><strong>${escapeHtml(s.nis)}</strong></td>
                    <td>${escapeHtml(s.nama)}</td>
                    <td>${escapeHtml(s.tempat_lahir || '-')}</td>
                    <td>${s.tanggal_lahir || '-'}</td>
                    <td>${escapeHtml(s.alamat || '-')}</td>
                    <td>${s.no_hp || '-'}</td>
                    <td>${s.foto ? `<img src="${s.foto}" class="student-photo" onclick="window.open('${s.foto}','_blank')">` : '-'}</td>
                    <td class="no-print"><div class="action-btns"><button class="btn btn-secondary btn-icon" onclick="editData('${s.nis}')">✏️ Edit</button><button class="btn btn-danger btn-icon" onclick="hapusData('${s.nis}')">🗑️ Hapus</button></div></td>
                </tr>
            `).join('');
        }

        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function updateTotal() { document.getElementById('totalSiswa').innerHTML = `Total Siswa: ${students.length}`; }
        function resetForm() {
            document.getElementById('nis').value = '';
            document.getElementById('nama').value = '';
            document.getElementById('tempat_lahir').value = '';
            document.getElementById('tanggal_lahir').value = '';
            document.getElementById('alamat').value = '';
            document.getElementById('no_hp').value = '';
            document.getElementById('foto').value = '';
            document.getElementById('photoPreview').innerHTML = '<span>📸 Klik untuk upload foto</span>';
        }
        function printTable() { window.print(); }
        function exportToExcel() {
            if (!students.length) return showToast('Tidak ada data', 'error');
            let csv = "No,NIS,Nama Lengkap,Tempat Lahir,Tanggal Lahir,Alamat,No HP,Link Foto\n";
            students.forEach((s, i) => {
                csv += `"${i+1}","${s.nis}","${s.nama}","${s.tempat_lahir || ''}","${s.tanggal_lahir || ''}","${s.alamat || ''}","${s.no_hp || ''}","${s.foto || ''}"\n`;
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = `buku_induk_siswa_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            showToast('Download CSV berhasil!', 'success');
        }

        loadData();
    </script>
</body>
</html>
